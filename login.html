<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpamShield — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080c14;
      --panel:    #0e1520;
      --border:   #1c2a3d;
      --accent:   #00e5ff;
      --accent2:  #7b5ea7;
      --danger:   #ff4d6d;
      --text:     #e2eaf5;
      --muted:    #556075;
      --glow:     0 0 24px rgba(0,229,255,.25);
    }

    html, body {
      height: 100%;
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── animated grid background ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 20s linear infinite;
    }
    @keyframes gridDrift {
      0%   { background-position: 0 0; }
      100% { background-position: 48px 48px; }
    }

    /* ── floating orbs ── */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none;
    }
    .orb-1 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(0,229,255,.15), transparent 70%);
      top: -120px; left: -80px;
      animation: floatA 12s ease-in-out infinite;
    }
    .orb-2 {
      width: 340px; height: 340px;
      background: radial-gradient(circle, rgba(123,94,167,.2), transparent 70%);
      bottom: -80px; right: -60px;
      animation: floatB 15s ease-in-out infinite;
    }
    @keyframes floatA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,40px)} }
    @keyframes floatB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-25px,-30px)} }

    /* ── layout ── */
    .page {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }

    /* ── card ── */
    .card {
      width: 100%; max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);
      animation: cardIn .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(28px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* ── badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,229,255,.08);
      border: 1px solid rgba(0,229,255,.2);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 11px; font-weight: 500; letter-spacing: .08em;
      color: var(--accent);
      margin-bottom: 28px;
      animation: cardIn .6s .1s cubic-bezier(.22,1,.36,1) both;
    }
    .badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }

    /* ── heading ── */
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800; line-height: 1.15;
      letter-spacing: -.02em;
      color: var(--text);
      margin-bottom: 6px;
      animation: cardIn .6s .15s cubic-bezier(.22,1,.36,1) both;
    }
    .card-title span { color: var(--accent); }

    .card-sub {
      font-size: 13px; color: var(--muted);
      margin-bottom: 32px;
      animation: cardIn .6s .2s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── form ── */
    .field {
      margin-bottom: 18px;
      animation: cardIn .6s .25s cubic-bezier(.22,1,.36,1) both;
    }
    .field:nth-of-type(2) { animation-delay: .3s; }

    label {
      display: block;
      font-size: 11px; letter-spacing: .1em; font-weight: 500;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; opacity: .45;
      pointer-events: none;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
      background: rgba(0,229,255,.04);
      box-shadow: var(--glow);
    }
    input::placeholder { color: var(--muted); opacity: .6; }

    /* toggle password */
    .toggle-pw {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 2px; transition: color .2s;
    }
    .toggle-pw:hover { color: var(--accent); }

    /* ── submit ── */
    .btn-login {
      width: 100%; margin-top: 8px;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent) 0%, #0090b8 100%);
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: .03em;
      color: #07111d;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .2s;
      animation: cardIn .6s .35s cubic-bezier(.22,1,.36,1) both;
    }
    .btn-login::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.18), transparent);
      opacity: 0; transition: opacity .2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,229,255,.35); }
    .btn-login:hover::after { opacity: 1; }
    .btn-login:active { transform: translateY(0); }

    /* ── error ── */
    .error-box {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,77,109,.08);
      border: 1px solid rgba(255,77,109,.25);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 20px;
      font-size: 13px; color: var(--danger);
      animation: shake .4s ease both;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }

    /* ── divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 20px;
      animation: cardIn .6s .4s cubic-bezier(.22,1,.36,1) both;
    }
    .divider span { font-size: 11px; color: var(--muted); white-space: nowrap; letter-spacing: .08em; }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── footer ── */
    .card-footer {
      text-align: center;
      font-size: 12px; color: var(--muted);
      margin-top: 20px;
      animation: cardIn .6s .45s cubic-bezier(.22,1,.36,1) both;
    }
    .card-footer strong { color: var(--accent); font-weight: 500; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="page">
  <div class="card">

    <div class="badge">
      <span class="badge-dot"></span>
      SPAMSHIELD · AI DETECTION
    </div>

    <h1 class="card-title">Welcome<br>back<span>.</span></h1>
    <p class="card-sub">Sign in to access your spam detection dashboard.</p>

    {% if error %}
    <div class="error-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" autocomplete="off">

      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#e2eaf5" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="username" name="username" placeholder="Enter username" required autofocus />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#e2eaf5" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="Enter password" required />
          <button type="button" class="toggle-pw" onclick="togglePw()" title="Show/hide password">
            <svg id="eye-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="divider"><span>SECURED</span></div>

    <div class="card-footer">
      Protected by <strong>SpamShield ML Engine</strong> · v2.1
    </div>

  </div>
</div>

<script>
  function togglePw() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      pw.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }
</script>
</body>
</html>
